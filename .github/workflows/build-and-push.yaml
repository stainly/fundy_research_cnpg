name: Build and Push PostgreSQL Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      pgvector_version:
        description: 'pgvector version'
        required: false
        default: 'v0.8.2'
      pgvectorscale_version:
        description: 'pgvectorscale version'
        required: false
        default: '0.9.0'
      pg_textsearch_version:
        description: 'pg_textsearch version (branch or tag)'
        required: false
        default: 'main'
      pg_version:
        description: 'PostgreSQL version'
        required: false
        default: '17'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PGVECTOR_VERSION: ${{ github.event.inputs.pgvector_version || 'v0.8.2' }}
  PGVECTORSCALE_VERSION: ${{ github.event.inputs.pgvectorscale_version || '0.9.0' }}
  PG_TEXTSEARCH_VERSION: ${{ github.event.inputs.pg_textsearch_version || 'main' }}
  PG_VERSION: ${{ github.event.inputs.pg_version || '17' }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/fundy_research_cnpg
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=pg${{ env.PG_VERSION }}-latest,enable={{is_default_branch}}
            type=sha,prefix=,suffix=,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PGVECTOR_VERSION=${{ env.PGVECTOR_VERSION }}
            PGVECTORSCALE_VERSION=${{ env.PGVECTORSCALE_VERSION }}
            PG_TEXTSEARCH_VERSION=${{ env.PG_TEXTSEARCH_VERSION }}
            PG_VERSION=${{ env.PG_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
